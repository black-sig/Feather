name: IPA Tarab Auto Builder
on:
  push:
    branches: [ main ] # يعمل تلقائياً عند رفع الكود
  workflow_dispatch: # يتيح لك التشغيل يدوياً أيضاً

jobs:
  build:
    # استخدام latest لضمان الحصول على أسرع خادم متاح
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install Dependencies
        run: |
          # إضافة أي مستلزمات يحتاجها مشروع Feather
          swift --version

      - name: Build and Archive
        run: |
          xcodebuild archive \
            -project Feather.xcodeproj \
            -scheme Feather \
            -archivePath build/Feather.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Create IPA Package
        run: |
          mkdir -p build/Payload
          cp -r build/Feather.xcarchive/Products/Applications/*.app build/Payload
          cd build && zip -vr IPATarab.ipa Payload
          
      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: IPA-Tarab-Edition
          path: build/IPATarab.ipa
          retention-days: 5
