name: IPA Tarab Builder
on:
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً بضغطة زر

jobs:
  build:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v3
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.0.app

      - name: Build IPA
        run: |
          xcodebuild archive -project Feather.xcodeproj -scheme Feather -archivePath build/Feather.xcarchive -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO
          mkdir -p build/Payload
          cp -r build/Feather.xcarchive/Products/Applications/*.app build/Payload
          cd build && zip -r IPATarab.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: IPATarab-File
          path: build/IPATarab.ipa
